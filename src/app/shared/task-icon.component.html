<div class="icon-tile" [style.background]="tint()">
  @switch (iconKey()) {
    @case ('lawn') {
      <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 14V7" /><path d="M8 9C8 6 6 4 3.5 3.5 3.5 6.5 5.5 8.5 8 9Z" /><path d="M8 8.5C8 6 9.8 4.2 12.5 4 12.5 6.5 10.6 8.2 8 8.5Z" /></svg>
    }
    @case ('boiler') {
      <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 2c1.8 2.6 3.2 3.8 3.2 6.2A3.2 3.2 0 0 1 4.8 8.2C4.8 6.8 5.6 6 6.2 5.2 7 6 7.4 4 8 2Z" /></svg>
    }
    @case ('gutter') {
      <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 2.5c2.2 3 3.5 4.7 3.5 6.7a3.5 3.5 0 0 1-7 0c0-2 1.3-3.7 3.5-6.7Z" /></svg>
    }
    @case ('alarm') {
      <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 2.2a3.6 3.6 0 0 0-3.6 3.6c0 2.4-1 3.4-1 3.4h9.2s-1-1-1-3.4A3.6 3.6 0 0 0 8 2.2Z" /><path d="M6.7 11.6a1.4 1.4 0 0 0 2.6 0" /></svg>
    }
    @case ('filter') {
      <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M2.5 4h11" /><path d="M4.5 8h7" /><path d="M6.5 12h3" /></svg>
    }
    @case ('radiator') {
      <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M3 4.5h10" /><path d="M3 11.5h10" /><path d="M5 4.5v7" /><path d="M8 4.5v7" /><path d="M11 4.5v7" /></svg>
    }
    @default {
      <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M11.2 2.8a2.7 2.7 0 0 0-3 4.2l-5 5 1.8 1.8 5-5a2.7 2.7 0 0 0 4.2-3l-2 2-1.3-.4-.4-1.3 1.7-1.7Z" /></svg>
    }
  }
</div>
