<div class="shell">
  <header class="app-header">
    <div class="header-top">
      <div>
        <p class="eyebrow">Maintenance</p>
        <h1 class="screen-title">{{ title() }}</h1>
      </div>
      <button class="theme-toggle" (click)="toggleTheme()" aria-label="Toggle light or dark theme">
        @if (theme() === 'dark') {
          <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M16.5 11.5A6.5 6.5 0 1 1 8.5 3.5a5 5 0 0 0 8 8Z" /></svg>
        } @else {
          <svg viewBox="0 0 20 20" aria-hidden="true">
            <circle cx="10" cy="10" r="3.4" />
            <path d="M10 2v1.6M10 16.4V18M2 10h1.6M16.4 10H18M4.3 4.3l1.2 1.2M14.5 14.5l1.2 1.2M15.7 4.3l-1.2 1.2M5.5 14.5l-1.2 1.2" />
          </svg>
        }
      </button>
    </div>
    <p class="subtitle">{{ subtitle() }}</p>

    <!-- Property switcher: horizontal single-select Listbox -->
    <ul
      ngListbox
      class="properties"
      orientation="horizontal"
      aria-label="Choose property"
      [value]="[store.activePropertyId()]"
      (valueChange)="onPropertyChange($event)"
    >
      @for (p of store.properties; track p.id) {
        <li ngOption [value]="p.id" class="property">
          <span class="property-dot" [style.background]="p.dot"></span>
          {{ p.name }}
        </li>
      }
    </ul>
  </header>

  <main class="content">
    @switch (screen()) {
      @case ('prep') { <app-task-prep /> }
      @case ('schedule') { <app-scheduling /> }
      @case ('smart') { <app-smart-plan /> }
    }
  </main>

  <nav class="tab-bar" aria-label="App sections">
    @for (item of nav; track item.key) {
      <button
        class="nav-btn"
        [class.active]="screen() === item.key"
        [attr.aria-current]="screen() === item.key ? 'page' : null"
        (click)="screen.set(item.key)"
      >
        @switch (item.key) {
          @case ('prep') {
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 11l2 2 4-4.5" /><rect x="4" y="4" width="16" height="16" rx="4" /></svg>
          }
          @case ('schedule') {
            <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="5" width="16" height="15" rx="3" /><path d="M4 9h16M8 3v3M16 3v3" /></svg>
          }
          @case ('smart') {
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v3M5.5 8.5l2 1M18.5 8.5l-2 1M12 12l4 5H8l4-5Z" /><path d="M9 20h6" /></svg>
          }
        }
        <span class="nav-label">{{ item.label }}</span>
      </button>
    }
  </nav>
</div>
