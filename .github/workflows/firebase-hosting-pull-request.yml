name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create firebase.ts from secrets
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MESASUREMENT_ID: ${{ secrets.FIREBASE_MESASUREMENT_ID }}
          FIREBASE_FIRESTORE_DB: ${{ secrets.FIREBASE_FIRESTORE_DB }}
        run: |
          cat > src/app/firebase.ts << EOF
          import { initializeApp } from 'firebase/app';
          import { getFirestore } from 'firebase/firestore';
          import { getAuth } from 'firebase/auth';
          import { getStorage } from 'firebase/storage';

          const firebaseConfig = {
            apiKey: "${FIREBASE_API_KEY}",
            authDomain: "${FIREBASE_AUTH_DOMAIN}",
            projectId: "${FIREBASE_PROJECT_ID}",
            storageBucket: "${FIREBASE_STORAGE_BUCKET}",
            messagingSenderId: "${FIREBASE_MESSAGING_SENDER_ID}",
            appId: "${FIREBASE_APP_ID}",
            measurementId: "${FIREBASE_MESASUREMENT_ID}"
          };

          export const firebaseApp = initializeApp(firebaseConfig);
          export const db = getFirestore(firebaseApp, "${FIREBASE_FIRESTORE_DB}");
          export const auth = getAuth(firebaseApp);
          export const storage = getStorage(firebaseApp);
          EOF
      - run: npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_RENTAL_MANAGER_BC6BA }}
          projectId: rental-manager-bc6ba
